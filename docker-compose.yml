version: '3.8'

services:
  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile.gateway
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./app.db
      - LLM_SERVICE_URL=http://llm-service:8001
      - SEARCH_SERVICE_URL=http://search-service:8002
      - FILE_SERVICE_URL=http://file-service:8003
      - VIZ_SERVICE_URL=http://viz-service:8004
      - CONFIG_SERVICE_URL=http://config-service:8005
    env_file: .env
    depends_on:
      - llm-service
      - search-service
      - file-service
      - viz-service
      - config-service
    volumes:
      - db-data:/app
      - uploads:/app/uploads
      - viz-outputs:/app/viz_outputs

  llm-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.llm
    ports:
      - "8001:8001"
    env_file: .env

  search-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.search
    ports:
      - "8002:8002"
    env_file: .env

  file-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.file
    ports:
      - "8003:8003"
    env_file: .env
    volumes:
      - uploads:/app/uploads

  viz-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.viz
    ports:
      - "8004:8004"
    env_file: .env
    volumes:
      - viz-outputs:/app/viz_outputs

  config-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.config
    ports:
      - "8005:8005"
    env_file: .env
    volumes:
      - db-data:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - gateway

volumes:
  db-data:
  uploads:
  viz-outputs:
